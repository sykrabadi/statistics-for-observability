version: "3"

services:
  api:
    build:
      dockerfile: ./api.Dockerfile
    ports:
      - '8083:8083'
    networks:
      - app
  prometheus:
    image: prom/prometheus:main-distroless
    ports:
      - '9090:9090'
    volumes:
      - './config/prometheus.yml:/etc/prometheus/prometheus.yml'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - api
    networks:
      - app
  load_generator:
    image: httpd:alpine
    command: ["sh", "-c", "sleep 5; echo START; ab -n 1000 -c 5 http://api:8083/home; echo DONE; sleep 1000"]
    depends_on:
      - api
      - prometheus
    networks:
      - app

networks:
  app:
